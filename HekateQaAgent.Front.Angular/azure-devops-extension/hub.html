<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>HEKATE-QA</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fff;
    }

    .fallback {
      padding: 24px;
      color: #18202a;
    }

    .fallback a {
      color: #0078d4;
      font-weight: 700;
    }
  </style>
  <script src="node_modules/requirejs/require.js"></script>
</head>
<body>
  <iframe
    id="hekate-frame"
    title="HEKATE-QA"
    allow="clipboard-read; clipboard-write"
      src="https://zzl1r85z-5053.use2.devtunnels.ms?v=20260527-1015">
  </iframe>
  <noscript>
    <div class="fallback">
      Activa JavaScript para usar HEKATE-QA o abre
      <a href="https://zzl1r85z-5053.use2.devtunnels.ms?v=20260527-1015" target="_blank" rel="noreferrer">HEKATE-QA</a>.
    </div>
  </noscript>
  <script>
    var currentUser = null;
    var frame = document.getElementById("hekate-frame");

    var currentBackendToken = "";

    function sendUserToAgent(user) {
      if (!frame || !frame.contentWindow) {
        return;
      }

      var displayName = user && (user.displayName || user.name)
        ? String(user.displayName || user.name).trim()
        : "";
      var id = user && (user.descriptor || user.id || user.name)
        ? String(user.descriptor || user.id || user.name).trim()
        : "";
      var email = user && user.name
        ? String(user.name).trim()
        : buildTechnicalEmail(id);

      var targetOrigin = new URL(frame.src).origin;
      frame.contentWindow.postMessage({
        source: "azure-devops-extension",
        type: "opi-agent-user",
        id: id,
        email: email,
        displayName: displayName,
        backendToken: currentBackendToken
      }, targetOrigin);
    }

    function buildTechnicalEmail(id) {
      var safeId = id ? String(id).trim().replace(/[^a-zA-Z0-9._-]/g, "_") : "unknown";
      return safeId + "@azuredevops.local";
    }

    frame.addEventListener("load", function () {
      if (currentUser) {
        sendUserToAgent(currentUser);
      }
    });

    require.config({
      paths: {
        "azure-devops-extension-sdk": "node_modules/azure-devops-extension-sdk/SDK.min"
      }
    });

    require(["azure-devops-extension-sdk"], function (SDK) {
      SDK.init({ loaded: false, applyTheme: true });
      SDK.ready().then(function () {
        currentUser = SDK.getUser();
        return SDK.getAppToken().then(function (token) {
          currentBackendToken = token || "";
          sendUserToAgent(currentUser);
        });
      }).then(function () {
        SDK.notifyLoadSucceeded();
      }).catch(function (error) {
        SDK.notifyLoadFailed(error && error.message ? error.message : "No se pudo cargar HEKATE-QA.");
      });
    });
  </script>
</body>
</html>
